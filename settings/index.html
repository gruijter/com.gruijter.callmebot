<!doctype html>
<html>
	<head>
		<script type="text/javascript" src="/homey.js" data-origin="settings"></script>
		<script type="text/javascript" src="settings.js" data-origin="settings"></script>
		<style>
			body {
				font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
				color: #333;
				margin: 0;
				padding: 15px;
			}
			h2 {
				font-weight: 600;
				margin-top: 0;
			}
			.tabs {
				display: flex;
				border-bottom: 2px solid #eaeaea;
				margin-bottom: 20px;
				gap: 5px;
			}
			.tab {
				padding: 10px 15px;
				cursor: pointer;
				border-bottom: 2px solid transparent;
				margin-bottom: -1px;
				font-weight: 500;
				color: #888;
				transition: all 0.2s ease;
			}
			.tab:hover {
				color: #333;
			}
			.tab-active {
				color: #000;
				border-bottom-color: #007aff;
			}
			.instructions {
				font-size: 13px;
				color: #555;
				background: #f4f6f8;
				padding: 15px;
				border-radius: 8px;
				margin-bottom: 20px;
				line-height: 1.6;
				border: 1px solid #e1e4e8;
			}
			.panel-buttons {
				display: flex;
				gap: 15px;
				margin-top: 10px;
				margin-bottom: 30px;
			}
			.panel-buttons button {
				flex: 1;
				padding: 12px;
				border: none;
				border-radius: 8px;
				font-size: 14px;
				font-weight: 600;
				cursor: pointer;
				transition: opacity 0.2s ease, transform 0.1s ease;
			}
			.panel-buttons button:active {
				transform: scale(0.98);
			}
			button.danger {
				background: #ff3b30;
				color: #fff;
			}
			button:hover {
				opacity: 0.9;
			}
			#loglines {
				font-family: "SFMono-Regular", Consolas, "Liberation Mono", Menlo, Courier, monospace;
				font-size: 12px;
				background: #282c34;
				color: #abb2bf;
				padding: 15px;
				border-radius: 10px;
				max-height: 400px;
				overflow-y: auto;
				white-space: pre-wrap;
				word-break: break-all;
			}
		</style>
	</head>
	<body>
		<div id="app">
			<h2 data-i18n="settings.benefit" style="margin: 15px 0;">Let Homey send messages to your phone</h2>
			
			<div class="tabs">
				<div id="tabb1" class="tab tab-inactive" onclick="showTab(1)" data-i18n="settings.tab1.title">Settings</div>
				<div id="tabb2" class="tab tab-inactive" onclick="showTab(2)" data-i18n="settings.tab2.title">Log</div>
			</div>

				<!-- Instructions panel -->
				<div id="tab1" class="panel" style="display: none;">
				<p data-i18n="settings.tab1.instructions" class="instructions">Instructions</p>
				</div>

				<!-- Logging panel -->
			<div id="tab2" class="panel" style="display: none;">
				<div class="panel-buttons" style="margin-top: 0; margin-bottom: 15px;">
					<button id="deleteButton" class="danger" onclick="deleteLogs()" data-i18n="settings.tab2.deleteLogs">Delete Logs</button>
					</div>
					<div id="loglines"></div>
				</div>

		</div>
	</body>
</html>
